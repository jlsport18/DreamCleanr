name: CI

on:
  push:
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
      - name: Install package
        run: pip install -e .
      - name: Compile
        run: python -m compileall dreamcleanr
      - name: Validate MCP module
        run: python -m py_compile dreamcleanr/mcp_server.py
      - name: Test
        run: python -m unittest discover -s tests -p "test_*.py" -v
      - name: Validate site JavaScript
        run: node --check site/app.js
      - name: Render sample report
        run: python -m dreamcleanr report --input reports/sample-cleanup-report.json --html-out /tmp/dreamcleanr-sample.html
