name: Operations Health

on:
  workflow_dispatch:
  schedule:
    - cron: "30 9 * * *"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  health:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
      - name: Install package
        run: pip install -e .
      - name: Compile
        run: python -m compileall dreamcleanr
      - name: Validate MCP module
        run: python -m py_compile dreamcleanr/mcp_server.py
      - name: Run tests
        run: python -m unittest discover -s tests -p "test_*.py" -v
      - name: Validate site JavaScript
        run: node --check site/app.js
      - name: Render sample report
        run: python -m dreamcleanr report --input reports/sample-cleanup-report.json --html-out /tmp/dreamcleanr-sample.html
      - name: Check live site
        run: |
          curl -fsSL https://jlsport18.github.io/DreamCleanr/ | grep -q "DreamCleanr"
          curl -fsSL https://jlsport18.github.io/DreamCleanr/ | grep -q "Clean while you sleep"
          curl -fsSL https://jlsport18.github.io/DreamCleanr/ | grep -q "releases/latest"
          curl -fsSLI https://github.com/jlsport18/DreamCleanr/releases/latest >/dev/null
          curl -fsSLI https://raw.githubusercontent.com/jlsport18/DreamCleanr/main/scripts/install.sh >/dev/null
          curl -fsSLI https://raw.githubusercontent.com/jlsport18/DreamCleanr/main/scripts/update.sh >/dev/null
          python - <<'PY'
          import json
          import urllib.request

          with urllib.request.urlopen("https://api.github.com/repos/jlsport18/DreamCleanr/releases/latest") as response:
              release = json.load(response)

          for asset in release.get("assets", []):
              if asset.get("name", "").endswith(".whl"):
                  request = urllib.request.Request(asset["browser_download_url"], method="HEAD")
                  with urllib.request.urlopen(request):
                      pass
                  break
          else:
              raise SystemExit("No wheel asset found on latest release")
          PY
      - name: Build health summary
        run: |
          python - <<'PY'
          import json
          from datetime import datetime, timezone
          from pathlib import Path

          payload = {
              "generated_at": datetime.now(timezone.utc).isoformat(),
              "checks": [
                  "compile",
                  "mcp_py_compile",
                  "unit_tests",
                  "site_js",
                  "sample_report_render",
                  "live_site_content",
                  "release_urls",
                  "install_update_scripts",
              ],
              "status": "healthy",
              "site": "https://jlsport18.github.io/DreamCleanr/",
          }
          out = Path("ops-health-summary.json")
          out.write_text(json.dumps(payload, indent=2), encoding="utf-8")
          PY
      - name: Upload health artifact
        uses: actions/upload-artifact@v7
        with:
          name: dreamcleanr-ops-health
          path: |
            ops-health-summary.json
            /tmp/dreamcleanr-sample.html
