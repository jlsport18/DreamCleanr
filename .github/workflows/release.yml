name: Release

on:
  push:
    tags:
      - "v*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install build
          python -m pip install -e .
      - name: Test
        run: python -m unittest discover -s tests -p "test_*.py" -v
      - name: Build artifacts
        run: python -m build
      - name: Create stable latest aliases
        run: |
          python - <<'PY'
          from pathlib import Path
          import shutil

          dist = Path("dist")
          wheel = next(path for path in dist.glob("dreamcleanr-*.whl") if "latest" not in path.name)
          sdist = next(path for path in dist.glob("dreamcleanr-*.tar.gz") if "latest" not in path.name)
          shutil.copy2(wheel, dist / "dreamcleanr-latest-py3-none-any.whl")
          shutil.copy2(sdist, dist / "dreamcleanr-latest.tar.gz")
          PY
      - name: Generate sample report
        run: python -m dreamcleanr report --input reports/sample-cleanup-report.json --html-out dist/sample-cleanup-report.html
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dreamcleanr-release
          path: |
            dist/*
            reports/sample-cleanup-report.json
      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*
            reports/sample-cleanup-report.json
            scripts/install.sh
            scripts/update.sh
