name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package
        run: pip install -e .
      - name: Compile
        run: python -m compileall dreamcleanr
      - name: Test
        run: python -m unittest discover -s tests -p "test_*.py" -v
