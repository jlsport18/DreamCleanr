name: Pro early access
description: Raise your hand for the premium macOS shell and guided cleanup workflows.
title: "[pro-interest] "
labels: ["enhancement"]
body:
  - type: textarea
    id: workflow
    attributes:
      label: Current workflow
      description: How are you using DreamCleanr today, or where would you start?
      placeholder: CLI, MCP, local AI-heavy Mac, Docker-heavy machine, nightly cleanup, receipts...
    validations:
      required: true
  - type: textarea
    id: premium_value
    attributes:
      label: What would make Pro worth it?
      description: Which premium shell workflows matter most to you?
      placeholder: Guided cleanup, richer history, presets, disk breakdowns, safer recommendations...
    validations:
      required: true
  - type: dropdown
    id: role
    attributes:
      label: Role
      options:
        - Solo AI developer
        - Indie hacker
        - Startup engineer
        - ML engineer
        - Team lead
        - Other
  - type: dropdown
    id: team_context
    attributes:
      label: Buying context
      description: Is this primarily a solo or small-team use case?
      options:
        - Solo / personal machine
        - Small team / shared standards
        - Evaluating both
  - type: dropdown
    id: price_signal
    attributes:
      label: Price sensitivity
      description: Which range feels realistic for the later one-time Pro shell?
      options:
        - Under $25
        - $25-$49
        - $50-$99
        - $100+
        - Not sure yet
  - type: textarea
    id: notes
    attributes:
      label: Anything else?
      description: Optional pricing, rollout, workflow, or team-policy notes.
